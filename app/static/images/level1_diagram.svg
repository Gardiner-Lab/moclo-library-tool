<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <!-- Title -->
  <text x="450" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#1f2937">Level 1: Transcriptional Cassette Assembly</text>
  
  <!-- Level 0 Parts (Input) -->
  <g transform="translate(50, 60)">
    <text x="200" y="0" font-size="14" font-weight="bold" fill="#6b7280">Level 0 Parts (Input)</text>
    
    <!-- Promoter -->
    <rect x="0" y="20" width="100" height="50" fill="#10b981" rx="3"/>
    <text x="50" y="45" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Promoter</text>
    <text x="50" y="60" font-size="9" text-anchor="middle" fill="white">GGAG→TACT</text>
    
    <!-- Plus sign -->
    <text x="120" y="55" font-size="20" font-weight="bold" fill="#6b7280">+</text>
    
    <!-- UTR -->
    <rect x="140" y="20" width="100" height="50" fill="#3b82f6" rx="3"/>
    <text x="190" y="45" font-size="12" font-weight="bold" text-anchor="middle" fill="white">5'UTR</text>
    <text x="190" y="60" font-size="9" text-anchor="middle" fill="white">TACT→AATG</text>
    
    <!-- Plus sign -->
    <text x="260" y="55" font-size="20" font-weight="bold" fill="#6b7280">+</text>
    
    <!-- CDS -->
    <rect x="280" y="20" width="100" height="50" fill="#8b5cf6" rx="3"/>
    <text x="330" y="45" font-size="12" font-weight="bold" text-anchor="middle" fill="white">CDS</text>
    <text x="330" y="60" font-size="9" text-anchor="middle" fill="white">AATG→AGGT</text>
    
    <!-- Plus sign -->
    <text x="400" y="55" font-size="20" font-weight="bold" fill="#6b7280">+</text>
    
    <!-- Terminator -->
    <rect x="420" y="20" width="100" height="50" fill="#ef4444" rx="3"/>
    <text x="470" y="45" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Terminator</text>
    <text x="470" y="60" font-size="9" text-anchor="middle" fill="white">AGGT→GCTT</text>
  </g>
  
  <!-- Arrow down -->
  <g transform="translate(450, 140)">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#6b7280" stroke-width="3"/>
    <polygon points="0,40 -8,30 8,30" fill="#6b7280"/>
    <text x="20" y="25" font-size="12" fill="#6b7280">BsaI digestion</text>
    <text x="20" y="40" font-size="12" fill="#6b7280">+ ligation</text>
  </g>
  
  <!-- Assembly Process -->
  <g transform="translate(150, 200)">
    <text x="300" y="0" font-size="14" font-weight="bold" fill="#6b7280">Assembly in Level 1 Vector</text>
    
    <!-- Level 1 Vector backbone -->
    <rect x="0" y="20" width="600" height="80" fill="#e5e7eb" rx="5" stroke="#9ca3af" stroke-width="2"/>
    
    <!-- Assembled parts inside -->
    <rect x="50" y="35" width="90" height="50" fill="#10b981" rx="3"/>
    <text x="95" y="60" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Promoter</text>
    
    <rect x="150" y="35" width="90" height="50" fill="#3b82f6" rx="3"/>
    <text x="195" y="60" font-size="11" font-weight="bold" text-anchor="middle" fill="white">5'UTR</text>
    
    <rect x="250" y="35" width="90" height="50" fill="#8b5cf6" rx="3"/>
    <text x="295" y="60" font-size="11" font-weight="bold" text-anchor="middle" fill="white">CDS</text>
    
    <rect x="350" y="35" width="90" height="50" fill="#ef4444" rx="3"/>
    <text x="395" y="60" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Terminator</text>
    
    <!-- BpiI sites -->
    <rect x="10" y="45" width="10" height="30" fill="#f59e0b"/>
    <rect x="580" y="45" width="10" height="30" fill="#f59e0b"/>
    <text x="15" y="115" font-size="9" text-anchor="middle" fill="#f59e0b">BpiI</text>
    <text x="585" y="115" font-size="9" text-anchor="middle" fill="#f59e0b">BpiI</text>
    
    <!-- Vector label -->
    <text x="300" y="130" font-size="11" text-anchor="middle" fill="#6b7280">Level 1 Vector (with BpiI sites for Level 2)</text>
  </g>
  
  <!-- Arrow down -->
  <g transform="translate(450, 350)">
    <line x1="0" y1="0" x2="0" y2="30" stroke="#6b7280" stroke-width="3"/>
    <polygon points="0,30 -8,20 8,20" fill="#6b7280"/>
  </g>
  
  <!-- Result -->
  <g transform="translate(250, 400)">
    <rect x="0" y="0" width="400" height="60" fill="#667eea" rx="5"/>
    <text x="200" y="25" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Complete Transcriptional Cassette</text>
    <text x="200" y="45" font-size="12" text-anchor="middle" fill="white">Ready for Level 2 assembly (flanked by BpiI sites)</text>
  </g>
</svg>
