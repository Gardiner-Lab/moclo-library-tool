<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Title -->
  <text x="400" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#1f2937">Level 0: Basic Parts</text>
  
  <!-- Promoter Part -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="150" height="80" fill="#10b981" rx="5"/>
    <text x="75" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Promoter</text>
    <text x="75" y="50" font-size="12" text-anchor="middle" fill="white">Position 1</text>
    <text x="75" y="70" font-size="10" text-anchor="middle" fill="white">GGAG → TACT</text>
    
    <!-- BsaI sites -->
    <rect x="-10" y="25" width="8" height="30" fill="#ef4444"/>
    <rect x="152" y="25" width="8" height="30" fill="#ef4444"/>
    <text x="-5" y="95" font-size="9" text-anchor="middle" fill="#ef4444">BsaI</text>
    <text x="156" y="95" font-size="9" text-anchor="middle" fill="#ef4444">BsaI</text>
  </g>
  
  <!-- 5' UTR Part -->
  <g transform="translate(250, 80)">
    <rect x="0" y="0" width="150" height="80" fill="#3b82f6" rx="5"/>
    <text x="75" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="white">5'UTR</text>
    <text x="75" y="50" font-size="12" text-anchor="middle" fill="white">Position 2</text>
    <text x="75" y="70" font-size="10" text-anchor="middle" fill="white">TACT → AATG</text>
    
    <!-- BsaI sites -->
    <rect x="-10" y="25" width="8" height="30" fill="#ef4444"/>
    <rect x="152" y="25" width="8" height="30" fill="#ef4444"/>
    <text x="-5" y="95" font-size="9" text-anchor="middle" fill="#ef4444">BsaI</text>
    <text x="156" y="95" font-size="9" text-anchor="middle" fill="#ef4444">BsaI</text>
  </g>
  
  <!-- CDS Part -->
  <g transform="translate(450, 80)">
    <rect x="0" y="0" width="150" height="80" fill="#8b5cf6" rx="5"/>
    <text x="75" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="white">CDS</text>
    <text x="75" y="50" font-size="12" text-anchor="middle" fill="white">Position 3</text>
    <text x="75" y="70" font-size="10" text-anchor="middle" fill="white">AATG → AGGT</text>
    
    <!-- BsaI sites -->
    <rect x="-10" y="25" width="8" height="30" fill="#ef4444"/>
    <rect x="152" y="25" width="8" height="30" fill="#ef4444"/>
    <text x="-5" y="95" font-size="9" text-anchor="middle" fill="#ef4444">BsaI</text>
    <text x="156" y="95" font-size="9" text-anchor="middle" fill="#ef4444">BsaI</text>
  </g>
  
  <!-- Terminator Part -->
  <g transform="translate(650, 80)">
    <rect x="0" y="0" width="150" height="80" fill="#ef4444" rx="5"/>
    <text x="75" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Terminator</text>
    <text x="75" y="50" font-size="12" text-anchor="middle" fill="white">Position 4</text>
    <text x="75" y="70" font-size="10" text-anchor="middle" fill="white">AGGT → GCTT</text>
    
    <!-- BsaI sites -->
    <rect x="-10" y="25" width="8" height="30" fill="#dc2626"/>
    <rect x="152" y="25" width="8" height="30" fill="#dc2626"/>
    <text x="-5" y="95" font-size="9" text-anchor="middle" fill="#dc2626">BsaI</text>
    <text x="156" y="95" font-size="9" text-anchor="middle" fill="#dc2626">BsaI</text>
  </g>
  
  <!-- Description -->
  <text x="400" y="220" font-size="14" text-anchor="middle" fill="#6b7280">Each Level 0 part contains:</text>
  <text x="400" y="245" font-size="12" text-anchor="middle" fill="#6b7280">• BsaI recognition sites (red bars) flanking the genetic element</text>
  <text x="400" y="265" font-size="12" text-anchor="middle" fill="#6b7280">• Position-specific 4-bp overhangs that determine assembly order</text>
  <text x="400" y="285" font-size="12" text-anchor="middle" fill="#6b7280">• Compatible overhangs ensure parts connect in the correct sequence</text>
  
  <!-- Key -->
  <g transform="translate(250, 320)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#1f2937">Key:</text>
    <rect x="0" y="10" width="30" height="15" fill="#10b981" rx="2"/>
    <text x="35" y="22" font-size="11" fill="#6b7280">Promoter</text>
    
    <rect x="100" y="10" width="30" height="15" fill="#3b82f6" rx="2"/>
    <text x="135" y="22" font-size="11" fill="#6b7280">5'UTR</text>
    
    <rect x="200" y="10" width="30" height="15" fill="#8b5cf6" rx="2"/>
    <text x="235" y="22" font-size="11" fill="#6b7280">CDS</text>
    
    <rect x="280" y="10" width="30" height="15" fill="#ef4444" rx="2"/>
    <text x="315" y="22" font-size="11" fill="#6b7280">Terminator</text>
  </g>
</svg>
